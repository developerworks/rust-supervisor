supervisor:
  strategy: OneForAll
policy:
  child_restart_limit: 10
  child_restart_window_ms: 60000
  supervisor_failure_limit: 30
  supervisor_failure_window_ms: 60000
  initial_backoff_ms: 100
  max_backoff_ms: 5000
  jitter_ratio: 0.10
  heartbeat_interval_ms: 1000
  stale_after_ms: 3000
  # restart_budget:                          # 可选, 重启预算限流 (本切片新增)
  #   window_secs: 60                        # 滑动窗口, 默认 60s
  #   max_burst: 10                          # 窗口内最大突发故障次数, 默认 10
  #   recovery_rate_per_sec: 0.5             # 每秒令牌恢复速率, 默认 0.5
  # group_strategies:                        # 可选, 分组策略 (本切片新增)
  #   - name: "group-a"
  #     children: ["child-1", "child-2"]
  #     budget:
  #       window_secs: 120
  #       max_burst: 20
  #       recovery_rate_per_sec: 1.0
shutdown:
  graceful_timeout_ms: 5000
  abort_wait_ms: 1000
observability:
  event_journal_capacity: 256
  metrics_enabled: true
  audit_enabled: true
ipc:
  enabled: false
  target_id: example-target
  path: /run/rust-supervisor/example-target.sock
  permissions: "0600"
  bind_mode: create_new
  registration:
    enabled: false
    relay_registration_path: /run/rust-supervisor/dashboard-relay-registration.sock
    display_name: "example target"
    lease_seconds: 30
    registration_heartbeat_interval_seconds: 15
